# ============================================================
# Docker Compose — SmartBite Distributed System (PRODUCTION)
# ============================================================
# This configuration is optimized for AWS Deployment using MongoDB Atlas.
# Local MongoDB container has been removed to save server resources.
# ============================================================

version: '3.8'

services:
  # ---- API Gateway ----
  api-gateway:
    build: ./services/api-gateway
    container_name: smartbite-gateway
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=smartbite_super_secret_key_2024
      - USER_SERVICE_URL=http://user-service:4001
      - RESTAURANT_SERVICE_URL=http://restaurant-service:4002
      - ORDER_SERVICE_URL=http://order-service:4003
      - PAYMENT_SERVICE_URL=http://payment-service:4004
      - DELIVERY_SERVICE_URL=http://delivery-service:4005
      - ANALYTICS_SERVICE_URL=http://analytics-service:4006
      - REVIEW_SERVICE_URL=http://review-service:4007
      - CHAT_SERVICE_URL=http://chat-service:4008
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- User Service ----
  user-service:
    build: ./services/user-service
    container_name: smartbite-user
    environment:
      - PORT=4001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=smartbite_super_secret_key_2024
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Restaurant Service ----
  restaurant-service:
    build: ./services/restaurant-service
    container_name: smartbite-restaurant
    environment:
      - PORT=4002
      - MONGO_URI=${MONGO_URI}
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Order Service ----
  order-service:
    build: ./services/order-service
    container_name: smartbite-order
    environment:
      - PORT=4003
      - MONGO_URI=${MONGO_URI}
      - USER_SERVICE_URL=http://user-service:4001
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Payment Service ----
  payment-service:
    build: ./services/payment-service
    container_name: smartbite-payment
    environment:
      - PORT=4004
      - MONGO_URI=${MONGO_URI}
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Delivery Service ----
  delivery-service:
    build: ./services/delivery-service
    container_name: smartbite-delivery
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - MONGO_URI=${MONGO_URI}
      - ORDER_SERVICE_URL=http://order-service:4003
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Analytics Service ----
  analytics-service:
    build: ./services/analytics-service
    container_name: smartbite-analytics
    environment:
      - PORT=4006
      - MONGO_URI=${MONGO_URI}
      - ORDER_SERVICE_URL=http://order-service:4003
      - PAYMENT_SERVICE_URL=http://payment-service:4004
      - RESTAURANT_SERVICE_URL=http://restaurant-service:4002
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Review Service ----
  review-service:
    build: ./services/review-service
    container_name: smartbite-review
    environment:
      - PORT=4007
      - MONGO_URI=${MONGO_URI}
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Chat Service ----
  chat-service:
    build: ./services/chat-service
    container_name: smartbite-chat
    ports:
      - "4008:4008"
    environment:
      - PORT=4008
      - MONGO_URI=${MONGO_URI}
    networks:
      - smartbite-network
    restart: unless-stopped

  # ---- Frontend (React + Vite) ----
  # IMPORTANT: Change 'localhost' to your AWS Public IP before building!
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000
        VITE_SOCKET_URL: http://localhost:4005
    container_name: smartbite-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - smartbite-network
    restart: unless-stopped

# ---- Shared Network ----
networks:
  smartbite-network:
    driver: bridge
